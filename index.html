<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>caelpi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    .search-bar {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: 90%;
      max-width: 560px;
    }
    .search-bar form {
      display: flex;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      overflow: hidden;
      transition: background 0.2s;
    }
    .search-bar form:focus-within {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.3);
    }
    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-size: 15px;
      padding: 12px 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }
    .search-bar input::placeholder { color: rgba(255, 255, 255, 0.4); }

    /* Right side panel */
    .side-panel {
      position: fixed;
      right: 32px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      text-align: right;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 28px 32px;
    }

    .clock {
      font-size: 64px;
      font-weight: 200;
      letter-spacing: -3px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .date {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
      font-weight: 400;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      margin: 20px 0;
    }

    .weather-temp {
      font-size: 40px;
      font-weight: 300;
      line-height: 1;
    }
    .weather-temp span {
      font-size: 20px;
      color: rgba(255, 255, 255, 0.4);
      vertical-align: top;
    }
    .weather-desc {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
    }
    .weather-details {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      margin-top: 8px;
      line-height: 1.6;
    }

    /* Spotify */
    .spotify {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
    }
    .spotify:hover { opacity: 0.8; }
    .spotify-art {
      width: 44px;
      height: 44px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .spotify-info { text-align: right; min-width: 0; }
    .spotify-track {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }
    .spotify-artist {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
      margin-top: 1px;
    }
    .spotify-label {
      font-size: 10px;
      color: #1db954;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .spotify-hidden { display: none; }

    img.bg {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    @media (max-width: 640px) {
      .side-panel {
        right: auto;
        left: 50%;
        top: auto;
        bottom: 16px;
        transform: translateX(-50%);
        text-align: center;
        padding: 14px 20px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .clock { font-size: 24px; letter-spacing: -1px; }
      .date { font-size: 11px; margin-top: 2px; }
      .divider {
        width: 1px;
        height: 32px;
        margin: 0;
      }
      .weather-temp { font-size: 22px; }
      .weather-temp span { font-size: 12px; }
      .weather-desc { font-size: 11px; margin-top: 2px; }
      .weather-details { display: none; }
      .spotify-section .divider { display: none; }
      .spotify-section { margin: 0; }
      .spotify-label { display: none; }
      .spotify { gap: 8px; }
      .spotify-art { width: 32px; height: 32px; border-radius: 4px; }
      .spotify-track { font-size: 11px; max-width: 100px; }
      .spotify-artist { font-size: 10px; max-width: 100px; }
      .spotify-info { text-align: center; }
      .search-bar { top: 12px; }
      .search-bar input { font-size: 14px; padding: 10px 16px; }
    }
  </style>
</head>
<body>
  <div class="search-bar">
    <form action="https://www.google.com/search" method="GET">
      <input type="text" name="q" placeholder="Search Google..." autocomplete="off" autofocus>
    </form>
  </div>

  <div class="side-panel">
    <div class="clock" id="clock"></div>
    <div class="date" id="date"></div>
    <div class="divider"></div>
    <div class="weather-temp" id="weatherTemp">--<span>&deg;</span></div>
    <div class="weather-desc" id="weatherDesc">loading...</div>
    <div class="weather-details" id="weatherDetails"></div>
    <div class="spotify-section spotify-hidden" id="spotifySection">
      <div class="divider"></div>
      <div class="spotify-label" id="spotifyLabel">Last played</div>
      <a class="spotify" id="spotifyLink" href="#" target="_blank" rel="noopener">
        <div class="spotify-info">
          <div class="spotify-track" id="spotifyTrack"></div>
          <div class="spotify-artist" id="spotifyArtist"></div>
        </div>
        <img class="spotify-art" id="spotifyArt" src="" alt="">
      </a>
    </div>
  </div>

  <img class="bg" src="/happy.gif" alt="">

  <script>
    function updateClock() {
      var now = new Date();
      document.getElementById("clock").textContent = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      document.getElementById("date").textContent = now.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" });
    }
    updateClock();
    setInterval(updateClock, 1000);

    function loadWeather() {
      fetch("/api/weather")
        .then(function(res) { return res.json(); })
        .then(function(w) {
          if (w.error) return;
          document.getElementById("weatherTemp").innerHTML = w.temp_f + '<span>&deg;F</span>';
          document.getElementById("weatherDesc").textContent = w.desc;
          document.getElementById("weatherDetails").innerHTML =
            "Feels like " + w.feels_like_f + "&deg; &middot; " +
            w.humidity + "% humidity &middot; " +
            w.wind_mph + " mph wind";
        })
        .catch(function() {
          document.getElementById("weatherDesc").textContent = "unavailable";
        });
    }
    loadWeather();
    setInterval(loadWeather, 10 * 60 * 1000);

    function loadSpotify() {
      fetch("/api/recently-played")
        .then(function(res) { return res.json(); })
        .then(function(s) {
          if (s.error) return;
          document.getElementById("spotifySection").classList.remove("spotify-hidden");
          document.getElementById("spotifyTrack").textContent = s.name;
          document.getElementById("spotifyArtist").textContent = s.artist;
          document.getElementById("spotifyLink").href = s.url;
          document.getElementById("spotifyLabel").textContent = s.is_playing ? "Now playing" : "Last played";
          if (s.image) document.getElementById("spotifyArt").src = s.image;
        })
        .catch(function() {});
    }
    loadSpotify();
    setInterval(loadSpotify, 60 * 1000);
  </script>
</body>
</html>
