<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>caelpi admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e0e0e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #141420;
      border: 1px solid #1e1e30;
      border-radius: 16px;
      padding: 36px;
      width: 320px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .sub { font-size: 13px; color: #6a6a80; margin-bottom: 24px; }
    input {
      width: 100%;
      background: #0a0a0f;
      border: 1px solid #1e1e30;
      color: #e0e0e8;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      margin-bottom: 12px;
    }
    input:focus { border-color: #7c6fe0; }
    button {
      width: 100%;
      background: #7c6fe0;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { opacity: 0.85; }
    .error {
      background: rgba(224, 80, 80, 0.15);
      border: 1px solid rgba(224, 80, 80, 0.3);
      color: #e05050;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error.show { display: block; }
  </style>
</head>
<body>
  <form class="login-box" method="POST" action="/admin/login">
    <h1>caelpi admin</h1>
    <div class="sub">enter password to continue</div>
    <div class="error" id="error">Incorrect password</div>
    <input type="password" name="password" placeholder="Password" autofocus>
    <button type="submit">Log in</button>
  </form>
  <script>
    if (location.search.indexOf("error=1") !== -1) {
      document.getElementById("error").classList.add("show");
    }
  </script>
</body>
</html>
